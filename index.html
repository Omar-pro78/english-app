<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA English — Omar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8; --bg2:#ede8de; --surface:#ffffff; --surface2:#ede8de;
  --border:#ddd6c8; --border2:#c8c0b0;
  --accent:#c1121f; --accent2:#2d6a4f; --purple:#7c3aed; --orange:#ea6c00; --gold:#b45309; --red:#dc2626;
  --text:#1a1a18; --muted:#6b6355;
  --mono:'IBM Plex Mono',monospace; --sans:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 45% at 85% 5%,rgba(45,106,79,.06) 0%,transparent 55%),
             radial-gradient(ellipse 55% 40% at 5% 90%,rgba(193,18,31,.04) 0%,transparent 55%),
             radial-gradient(ellipse 50% 35% at 50% 50%,rgba(200,192,176,.3) 0%,transparent 60%);}
.shell{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;border-bottom:1px solid var(--border);
  background:rgba(245,240,232,.96);backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:100;}
.logo-name{font-size:1.1rem;font-weight:800;letter-spacing:-.5px;}
.logo-name em{color:var(--accent);font-style:normal;}
.logo-sub{font-family:var(--mono);font-size:.5rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;}
.hd-stats{display:flex;gap:8px;}
.hd-stat{display:flex;flex-direction:column;align-items:center;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-family:var(--mono);min-width:48px;}
.hd-stat .n{font-size:.9rem;font-weight:500;color:var(--accent);line-height:1;}
.hd-stat .l{font-size:.44rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}

/* ── NAV ── */
nav{display:none;} /* nav remplacé par home screen */

/* ── HOME SCREEN ── */
.home-screen{flex:1;display:flex;flex-direction:column;max-width:600px;width:100%;margin:0 auto;padding:32px 16px 60px;}
.home-title{font-family:var(--mono);font-size:.6rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;text-align:center;}
.home-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:28px;}

/* Home cards — horizontal list layout */
.home-card{background:var(--surface);border:1.5px solid var(--border2);border-radius:16px;
  padding:18px 20px;display:flex;align-items:center;gap:16px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.home-card::after{content:'›';position:absolute;right:18px;font-size:1.1rem;
  color:var(--border2);transition:all .2s;}
.home-card:hover{transform:translateX(4px);border-color:var(--card-color,var(--accent2));}
.home-card:hover::after{color:var(--card-color,var(--accent2));right:14px;}

/* Left color bar */
.home-card-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0;
  background:var(--card-color,var(--accent2));}

/* Icon */
.home-card-icon{font-size:1.5rem;flex-shrink:0;width:36px;text-align:center;}

/* Text block */
.home-card-body{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.home-card-label{font-size:.88rem;font-weight:800;color:var(--text);line-height:1.2;}
.home-card-sub{font-family:var(--mono);font-size:.58rem;color:var(--muted);letter-spacing:.3px;}

/* Right: progress info */
.home-card-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;margin-right:18px;}
.home-card-count{font-family:var(--mono);font-size:.72rem;font-weight:700;color:var(--card-color,var(--accent2));}
.home-card-prog{font-family:var(--mono);font-size:.52rem;color:var(--muted);}

/* Divider between content group and action group */
.home-divider{height:1px;background:var(--border);margin:6px 0 8px;}

/* Hub page (sub-module selector) */
.hub-page{flex:1;display:flex;flex-direction:column;max-width:640px;width:100%;margin:0 auto;padding:24px 16px 60px;}
.hub-tag{display:inline-block;font-family:var(--mono);font-size:.58rem;
  border:1px solid;border-radius:6px;padding:3px 9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.hub-title{font-size:1.1rem;font-weight:800;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.hub-subtitle{font-size:.75rem;color:var(--muted);margin-bottom:28px;}
.hub-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.hub-card{background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;
  padding:18px 20px;display:flex;align-items:center;gap:16px;
  cursor:pointer;transition:all .2s;}
.hub-card:hover{transform:translateX(4px);border-color:var(--hc-color,var(--accent2));}
.hub-card-icon{font-size:1.6rem;flex-shrink:0;}
.hub-card-info{flex:1;}
.hub-card-label{font-size:.92rem;font-weight:800;color:var(--text);margin-bottom:3px;}
.hub-card-desc{font-size:.72rem;color:var(--muted);font-family:var(--mono);}
/* Progress bar inside hub cards */
.hub-card-prog-wrap{margin-top:8px;display:flex;align-items:center;gap:8px;}
.hub-card-prog-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.hub-card-prog-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.hub-card-prog-label{font-family:var(--mono);font-size:.5rem;color:var(--muted);white-space:nowrap;}
.hub-card-arrow{font-size:1rem;color:var(--border2);transition:color .18s;flex-shrink:0;}
.hub-card:hover .hub-card-arrow{color:var(--hc-color,var(--accent2));}
.home-back{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.65rem;
  color:var(--muted);cursor:pointer;padding:12px 16px;border-bottom:1px solid var(--border);
  background:var(--bg2);transition:color .18s;}
.home-back:hover{color:var(--text);}
.home-back svg{width:14px;height:14px;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.02);}
.nav-item.active{color:var(--text);}
.nav-item.vocab-tab.active  {border-bottom-color:var(--accent);}
.nav-item.expr-tab.active   {border-bottom-color:var(--accent2);}
.nav-item.prep-tab.active   {border-bottom-color:var(--purple);}
.nav-item.phrasal-tab.active{border-bottom-color:var(--orange);}
.nav-item.take-tab.active   {border-bottom-color:#38bdf8;}
.nav-item.grammar-tab.active{border-bottom-color:var(--gold);}
.nav-item.grammar2-tab.active{border-bottom-color:#e879f9;}
.nav-item.review-tab.active {border-bottom-color:#e8c97a;}
.nav-badge{font-family:var(--mono);font-size:.5rem;padding:2px 5px;
  border-radius:99px;background:var(--surface);border:1px solid var(--border2);color:var(--muted);}
.vocab-tab.active   .nav-badge{background:rgba(193,18,31,.2);border-color:rgba(193,18,31,.5);color:var(--accent);}
.expr-tab.active    .nav-badge{background:rgba(45,106,79,.2);border-color:rgba(45,106,79,.5);color:var(--accent2);}
.prep-tab.active    .nav-badge{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:var(--purple);}
.phrasal-tab.active .nav-badge{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.4);color:var(--orange);}
.take-tab.active    .nav-badge{background:rgba(56,189,248,.15);border-color:rgba(56,189,248,.4);color:#38bdf8;}
.grammar-tab.active .nav-badge{background:rgba(245,197,24,.15);border-color:rgba(245,197,24,.4);color:var(--gold);}
.grammar2-tab.active .nav-badge{background:rgba(232,121,249,.15);border-color:rgba(232,121,249,.4);color:#e879f9;}
.review-tab.active  .nav-badge{background:rgba(232,201,122,.15);border-color:rgba(232,201,122,.4);color:#e8c97a;}

main{flex:1;display:flex;flex-direction:column;}

/* ── SHARED WRAPPER ── */
.page{flex:1;display:flex;flex-direction:column;max-width:700px;width:100%;margin:0 auto;padding:24px 16px 60px;}

/* ── FLASHCARD ── */
.fc-progress-strip{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.fc-prog-bar{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.fc-prog-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.vocab-fill  {background:linear-gradient(90deg,#c1121f,#ff4d5e);}
.expr-fill   {background:linear-gradient(90deg,#2d6a4f,#52b788);}
.prep-fill   {background:linear-gradient(90deg,var(--purple),#d89cff);}
.phrasal-fill{background:linear-gradient(90deg,var(--orange),#fbbf24);}
.take-fill   {background:linear-gradient(90deg,#38bdf8,#818cf8);}
.grammar-fill{background:linear-gradient(90deg,var(--gold),#ffe066);}
.grammar2-fill{background:linear-gradient(90deg,#e879f9,#a855f7);}
.fc-prog-txt{font-family:var(--mono);font-size:.6rem;color:var(--muted);white-space:nowrap;}

.flashcard{background:var(--surface);border:1.5px solid var(--border2);border-radius:20px;
  min-height:300px;display:flex;flex-direction:column;position:relative;overflow:hidden;
  margin-bottom:16px;transition:border-color .3s;}
.flashcard.is-ok {border-color:rgba(0,212,170,.45);}
.flashcard.is-rev{border-color:rgba(245,197,24,.45);}
.card-stripe{height:4px;width:100%;}
.flashcard:not(.is-ok):not(.is-rev) .card-stripe{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.flashcard.is-ok  .card-stripe{background:linear-gradient(90deg,#2d6a4f,#52b788);}
.flashcard.is-rev .card-stripe{background:linear-gradient(90deg,var(--gold),#ffaa00);}
.flashcard.prep-card:not(.is-ok):not(.is-rev) .card-stripe{background:linear-gradient(90deg,var(--purple),var(--accent2));}

.card-badge{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:.5rem;
  letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:6px;border:1px solid;}
.badge-ok {color:#52b788;background:rgba(45,106,79,.18);border-color:rgba(45,106,79,.45);}
.badge-rev{color:var(--gold);background:rgba(245,197,24,.12);border-color:rgba(245,197,24,.35);}
.badge-new{color:var(--muted);background:rgba(160,112,96,.08);border-color:var(--border2);}

.card-body{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:28px 24px 20px;text-align:center;}
.card-num {font-family:var(--mono);font-size:.55rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.card-word{font-size:clamp(1.3rem,4vw,2rem);font-weight:800;line-height:1.2;margin-bottom:8px;color:var(--text);}
.card-trad{font-size:.9rem;color:var(--muted);font-style:italic;margin-bottom:8px;line-height:1.4;}
.card-extra{font-size:.78rem;color:var(--accent2);font-family:var(--mono);margin-bottom:16px;line-height:1.5;font-style:normal;}
.card-example{font-size:.8rem;color:rgba(26,26,24,.65);margin-bottom:4px;line-height:1.5;}
.card-example-trad{font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:16px;}

.card-audio-row{display:flex;gap:8px;justify-content:center;}
.btn-audio{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:.6rem;
  padding:5px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;
  cursor:pointer;color:var(--muted);transition:all .18s;}
.btn-audio:hover{background:rgba(193,18,31,.12);border-color:var(--accent);color:var(--accent);}
.btn-audio svg{width:11px;height:11px;flex-shrink:0;}

.card-footer{display:flex;gap:8px;padding:0 20px 20px;flex-wrap:wrap;justify-content:center;}
.btn-act{flex:1;min-width:120px;max-width:210px;font-family:var(--sans);font-size:.72rem;font-weight:700;
  padding:9px 12px;border-radius:10px;cursor:pointer;border:1.5px solid;transition:all .18s;letter-spacing:.1px;}
.btn-ok {background:rgba(0,212,170,.08);border-color:rgba(0,212,170,.35);color:var(--accent);}
.btn-ok:hover{background:rgba(0,212,170,.18);transform:translateY(-1px);}
.btn-ok.on{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn-rev{background:rgba(245,197,24,.07);border-color:rgba(245,197,24,.3);color:var(--gold);}
.btn-rev:hover{background:rgba(245,197,24,.16);transform:translateY(-1px);}
.btn-rev.on{background:var(--gold);color:var(--bg);border-color:var(--gold);}

.fc-nav{display:flex;align-items:center;gap:12px;justify-content:center;}
.btn-nav{width:44px;height:44px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border2);
  cursor:pointer;color:var(--text);font-size:1rem;transition:all .18s;
  display:flex;align-items:center;justify-content:center;}
.btn-nav:hover:not(:disabled){background:var(--surface2);border-color:var(--accent);color:var(--accent);transform:scale(1.05);}
.btn-nav:disabled{opacity:.25;cursor:not-allowed;}
.nav-center{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:120px;}
.nav-pos {font-family:var(--mono);font-size:.8rem;font-weight:500;color:var(--text);}
.nav-hint{font-family:var(--mono);font-size:.5rem;color:var(--muted);letter-spacing:1px;}

.fc-review-cta{margin-top:16px;text-align:center;}
.btn-goto-rev{font-family:var(--sans);font-size:.71rem;font-weight:700;padding:8px 20px;border-radius:99px;
  background:rgba(193,18,31,.1);border:1.5px solid rgba(193,18,31,.35);color:var(--accent);
  cursor:pointer;transition:all .2s;letter-spacing:.2px;}
.btn-goto-rev:hover:not(:disabled){background:rgba(193,18,31,.2);transform:scale(1.02);}
.btn-goto-rev:disabled{opacity:.3;cursor:default;}
.rev-chip{display:inline-block;font-family:var(--mono);font-size:.56rem;background:var(--accent);
  color:#fff;border-radius:99px;padding:1px 7px;margin-left:5px;font-weight:700;}

/* ── PREP SUB-NAV ── */
.prep-subnav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px;}
.prep-subbtn{font-family:var(--mono);font-size:.62rem;padding:6px 14px;
  border:1.5px solid var(--border2);border-radius:8px;background:transparent;
  color:var(--muted);cursor:pointer;transition:all .18s;letter-spacing:.5px;}
.prep-subbtn:hover{border-color:var(--purple);color:var(--text);}
.prep-subbtn.active{background:rgba(168,85,247,.15);border-color:var(--purple);color:var(--purple);}
.phrasal-subbtn{font-family:var(--mono);font-size:.62rem;padding:6px 14px;
  border:1.5px solid var(--border2);border-radius:8px;background:transparent;
  color:var(--muted);cursor:pointer;transition:all .18s;letter-spacing:.5px;}
.phrasal-subbtn:hover{border-color:var(--orange);color:var(--text);}
.phrasal-subbtn.active{background:rgba(249,115,22,.15);border-color:var(--orange);color:var(--orange);}

/* ── COURS VIEW ── */
.cours-view{flex:1;display:flex;flex-direction:column;max-width:700px;width:100%;margin:0 auto;padding:24px 16px 60px;}
.cours-title{font-size:1rem;font-weight:800;color:var(--purple);font-family:var(--mono);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.cours-subtitle{font-size:.75rem;color:var(--muted);margin-bottom:22px;}

.cours-table{width:100%;border-collapse:collapse;margin-bottom:28px;border-radius:12px;overflow:hidden;}
.cours-table th{background:var(--surface2);font-family:var(--mono);font-size:.6rem;
  color:var(--accent);text-transform:uppercase;letter-spacing:1px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border2);}
.cours-table td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:.82rem;vertical-align:top;}
.cours-table tr:last-child td{border-bottom:none;}
.cours-table tr:hover td{background:rgba(193,18,31,.04);}
.td-prep{font-weight:800;font-size:.95rem;color:var(--text);}
.td-prep-audio{display:flex;align-items:center;gap:6px;}
.td-type{color:var(--accent);font-family:var(--mono);font-size:.7rem;}
.td-ex{color:var(--text);font-size:.82rem;}
.td-ex-audio{display:flex;align-items:center;gap:6px;}
.td-trad{color:var(--muted);font-style:italic;font-size:.78rem;}
.btn-tbl-audio{display:flex;align-items:center;background:none;border:none;cursor:pointer;
  color:var(--accent);opacity:.7;transition:opacity .15s;padding:0;flex-shrink:0;}
.btn-tbl-audio:hover{opacity:1;}
.btn-tbl-audio svg{width:13px;height:13px;}

.cours-section-tag{display:inline-block;font-family:var(--mono);font-size:.58rem;
  background:rgba(193,18,31,.15);border:1px solid rgba(193,18,31,.4);color:var(--accent);
  border-radius:6px;padding:3px 9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.cours-section-tag.orange{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.35);color:var(--orange);}
.cours-section-tag.gold{background:rgba(245,197,24,.15);border-color:rgba(245,197,24,.35);color:var(--gold);}
.cours-title{font-size:1rem;font-weight:800;color:var(--accent);font-family:var(--mono);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.cours-title.orange{color:var(--orange);}
.cours-title.gold{color:var(--gold);}
.cours-subtitle{font-size:.75rem;color:var(--muted);margin-bottom:22px;}

/* Grammar MCQ */
.grammar-tab.active{border-bottom-color:var(--gold);}
.mcq-section{display:flex;flex-direction:column;gap:14px;margin-top:8px;}
.mcq-card{background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;padding:20px;}
.mcq-q{font-size:.88rem;font-weight:700;margin-bottom:14px;line-height:1.4;color:var(--text);}
.mcq-q em{font-style:italic;color:var(--gold);font-size:.82rem;}
.mcq-opts{display:flex;flex-direction:column;gap:7px;}
.mcq-opt{font-family:var(--sans);font-size:.8rem;padding:9px 14px;border-radius:8px;
  background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);
  cursor:pointer;text-align:left;transition:all .18s;font-weight:600;}
.mcq-opt:hover:not(:disabled){border-color:var(--accent);background:rgba(193,18,31,.1);}
.mcq-opt.correct{background:rgba(45,106,79,.2);border-color:#52b788;color:#52b788;}
.mcq-opt.wrong{background:rgba(193,18,31,.15);border-color:var(--accent);color:var(--accent);}
.mcq-opt:disabled{cursor:default;}
.mcq-feedback{font-family:var(--mono);font-size:.7rem;margin-top:10px;padding:8px 12px;
  border-radius:8px;line-height:1.4;}
.mcq-feedback.ok  {background:rgba(45,106,79,.15);color:#52b788;}
.mcq-feedback.fail{background:rgba(193,18,31,.12);color:#ff8888;}
.mcq-score-bar{display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1.5px solid var(--border2);border-radius:12px;
  padding:14px 18px;margin-bottom:18px;}
.mcq-score-info h3{font-size:.9rem;font-weight:700;margin-bottom:2px;}
.mcq-score-info p{font-size:.65rem;color:var(--muted);font-family:var(--mono);}
.mcq-score-num{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--gold);}
.btn-mcq-reset{font-family:var(--sans);font-size:.7rem;font-weight:700;padding:7px 16px;
  border-radius:8px;background:var(--surface2);border:1.5px solid var(--border2);
  color:var(--text);cursor:pointer;transition:all .18s;}
.btn-mcq-reset:hover{border-color:var(--accent);}

/* ── REVIEW LAUNCHER ── */
.review-section{flex:1;display:flex;flex-direction:column;max-width:580px;width:100%;margin:0 auto;padding:24px 16px 60px;}
.rl-title{font-family:var(--mono);font-size:.64rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.rl-list{display:flex;flex-direction:column;gap:10px;}
.rl-card{background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;
  padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.rl-info h3{font-size:.9rem;font-weight:700;margin-bottom:4px;}
.rl-info p{font-size:.65rem;color:var(--muted);font-family:var(--mono);}
.btn-launch{font-family:var(--sans);font-weight:700;font-size:.7rem;padding:8px 16px;
  border-radius:10px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-launch:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px);}

.fb-ok  {color:var(--accent);font-weight:700;}
.fb-fail{color:var(--red);}
.fb-ans {color:var(--gold);font-family:var(--mono);font-weight:600;}

.quiz-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

.quiz-results{text-align:center;padding:16px 8px;}

/* TOAST */

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.speak-page{flex:1;display:flex;flex-direction:column;max-width:640px;width:100%;margin:0 auto;padding:24px 16px 60px;}

.speak-feedback-card{background:var(--surface);border:1.5px solid var(--border2);border-radius:16px;

<script>

const DATA = {

function load() {
  try {
    const r = localStorage.getItem('qae_v5');
    if (!r) return;
    const p = JSON.parse(r);
    S.status       = p.status      || {};
    S.streak       = p.streak      || 0;
    S.cursor       = p.cursor      || {vocab:0,expr:0,prep:0,phrasal:0,take:0};
    S.sessProgress = p.sessProgress || {};
  } catch(e){}
}

  localStorage.setItem('qae_v5', JSON.stringify({
    status:S.status, streak:S.streak, cursor:S.cursor, sessProgress:S.sessProgress
  }));
}
const k = (sec,i) => `${sec}_${i}`;
const getS = (sec,i) => S.status[k(sec,i)] || null;

const cntOk  = () => Object.values(S.status).filter(v=>v==='ok').length;
const cntRev = () => Object.values(S.status).filter(v=>v==='review').length;
function revQueue(source) {
  let out=[];
  const secs = source==='all'?['vocab','expr','prep','phrasal']:
               source==='prep-only'?['prep']:
               source==='phrasal-only'?['phrasal']:[source];
  secs.forEach(sec=>{
    DATA[sec].forEach((it,i)=>{
      if(getS(sec,i)==='review') out.push({...it,_sec:sec,_idx:i});
    });
  });
  return shuffle(out);
}
function fullQueue(source) {
  let out=[];
  const secs = source==='all'?['vocab','expr','prep','phrasal']:
               source==='prep-only'?['prep']:
               source==='phrasal-only'?['phrasal']:[source];
  secs.forEach(sec=>{
    DATA[sec].forEach((it,i)=>out.push({...it,_sec:sec,_idx:i}));
  });
  return shuffle(out);
}

  speechSynthesis.cancel();

}

function goBack() {
  const parent = TAB_PARENT[S.tab];
  if (parent) {
    switchTab(parent);
  } else {
    goHome();
  }
}

function goHome() {
  S.tab = 'home';
  document.getElementById('backBar').style.display = 'none';
  document.getElementById('backBar').onclick = goHome;
  render();
}

function switchTab(tab) {
  S.tab = tab;
  const bar = document.getElementById('backBar');
  bar.style.display = 'flex';
  // Hub pages go back to home; sub-pages go back to their hub
  if (HUB_TABS.has(tab)) {
    bar.onclick = goHome;
    bar.querySelector ? null : null;
  } else {
    bar.onclick = goBack;
  }
  render();
}

// QUIZ
// ═══════════════════════════════════════════════════════════
function startQuiz(source){
  const q=revQueue(source);
  if(!q.length){toast('Rien à réviser !');return;}
  S.quiz={queue:q,idx:0,results:[],answered:false,input:'',source};
  render();
}
function startFull(){
  S.quiz={queue:fullQueue('all'),idx:0,results:[],answered:false,input:'',source:'full'};
  render();
}

function buildQuiz(){
  const q=S.quiz;
  if(q.idx>=q.queue.length) return buildResults();
  const item=q.queue[q.idx];
  const ans=q.answered, isOk=ans&&q.results[q.idx];
  const isPrep=item._sec==='prep';
  const dots=q.queue.map((_,i)=>{
    let c='dot';
    if(i<q.idx) c+=q.results[i]?' ok':' fail';
    if(i===q.idx) c+=' curr';
    return `<div class="${c}"></div>`;
  }).join('');

  // For preps: show FR usage type → write EN preposition
  // For vocab/expr: show FR → write EN
  const promptLabel = isPrep ? 'Écris la préposition anglaise →' : 'Traduis en anglais →';
  const promptWord  = isPrep ? `${item.fr}<br><span style="font-size:.75rem;color:var(--muted);font-style:italic;font-weight:400">${item.exampleTrad||''}</span>` : item.fr;
  const catLabel    = isPrep ? `📐 ${item.section}` : item._sec==='vocab'?'📚 Vocabulaire':'💬 Expression';
  const hint        = isPrep ? `<div class="quiz-hint">Exemple : <em>${item.example||''}</em></div>` : '';

  const wrap=document.createElement('div');
  wrap.className='review-section fade-up';
  wrap.innerHTML=`
    <div class="quiz-top">
      <div class="quiz-ctr">Question ${q.idx+1} / ${q.queue.length}</div>
      <button class="btn-quit" onclick="quitQuiz()">✕ Quitter</button>
    </div>
    <div class="quiz-dots">${dots}</div>
    <div class="quiz-card">
      <div class="quiz-lbl">${promptLabel}</div>
      <div class="quiz-word">${promptWord}</div>
      <div class="quiz-cat">${catLabel}</div>
      <div class="quiz-audio-row">
        <button class="btn-audio" onclick="speak('${esc(item.fr)}','fr')">${spkSvg()} FR</button>
        ${ans?`<button class="btn-audio" onclick="speak('${esc(item.en)}','en')">${spkSvg()} EN</button>`:''}
      </div>
      ${ans?'':hint}
      <input class="quiz-input ${ans?(isOk?'ok':'fail'):''}"
        id="qinput" type="text"
        placeholder="Ta réponse en anglais..."
        value="${esc(q.input)}"
        ${ans?'readonly':''}
        oninput="S.quiz.input=this.value"
        onkeydown="if(event.key==='Enter'&&!S.quiz.answered)submitQ()"
      />
      <div class="quiz-feedback">
        ${ans?(isOk
          ?`<span class="fb-ok">✓ Correct !</span>`
          :`<span class="fb-fail">✗ Incorrect —</span><span class="fb-ans">&nbsp;${item.en}</span>`):''}
      </div>
      <div class="quiz-btns">
        ${!ans
          ?`<button class="btn-q prim" onclick="submitQ()">Valider ↵</button>`
          :`<button class="btn-q prim" onclick="nextQ()">${q.idx+1>=q.queue.length?'Voir les résultats 🏆':'Suivant →'}</button>`
        }
      </div>
      ${!ans?`<button class="btn-skip" onclick="skipQ()">Passer ce mot →</button>`:''}
    </div>`;
  setTimeout(()=>{const i=document.getElementById('qinput');if(i&&!ans)i.focus();},40);
  return wrap;
}

function buildResults(){
  const q=S.quiz;
  const total=q.results.length, ok=q.results.filter(Boolean).length, fail=total-ok;
  const pct=total?Math.round((ok/total)*100):0;
  let em='😅',ti='Continue !',su='Quelques erreurs — retente !';
  if(pct>=90){em='🏆';ti='Excellent !';su='Quasi parfait, bravo !';}
  else if(pct>=70){em='💪';ti='Bien joué !';su='Encore quelques à consolider.';}
  else if(pct>=50){em='📈';ti='En progrès !';su='La moitié réussie — continue !';}
  const wrap=document.createElement('div');
  wrap.className='review-section fade-up';
  wrap.innerHTML=`
    <div class="quiz-results">
      <div class="res-emoji">${em}</div>
      <div class="res-title">${ti}</div>
      <div class="res-sub">${su}</div>
      <div class="res-scores">
        <div class="res-score ok"><div class="n">${ok}</div><div class="l">Corrects</div></div>
        <div class="res-score fail"><div class="n">${fail}</div><div class="l">Erreurs</div></div>
        <div class="res-score"><div class="n">${pct}%</div><div class="l">Score</div></div>
      </div>
      <div class="res-btns">
        <button class="btn-res prim" onclick="retryFail()">🔄 Refaire les erreurs</button>
        <button class="btn-res sec" onclick="quitQuiz()">← Retour</button>
      </div>
    </div>`;
  return wrap;
}

function submitQ(){
  const q=S.quiz; if(q.answered)return;
  const inp=document.getElementById('qinput');
  const val=(inp?inp.value:q.input).trim();
  if(!val){toast('Entre une réponse !');return;}
  const item=q.queue[q.idx];
  const isOk=checkAns(val,item.en);
  q.results[q.idx]=isOk; q.answered=true;
  if(isOk){S.streak++;setS(item._sec,item._idx,'ok');toast('✓ Bravo !');}
  else{S.streak=0;setS(item._sec,item._idx,'review');}
  save(); render();
}
function skipQ(){const q=S.quiz;q.results[q.idx]=false;q.answered=true;q.input='';render();}
function nextQ(){S.quiz.idx++;S.quiz.answered=false;S.quiz.input='';render();}
function retryFail(){
  const q=S.quiz;
  const failed=q.queue.filter((_,i)=>!q.results[i]);
  if(!failed.length){quitQuiz();return;}
  S.quiz={queue:shuffle(failed),idx:0,results:[],answered:false,input:'',source:q.source};
  render();
}
function quitQuiz(){S.quiz=null;render();}

function buildMcqBlock(qcmData, answersKey, resetFn, answerFn, title, color) {
  const answers = S[answersKey] || {};
  const answered = Object.keys(answers).length;
  const correct  = Object.entries(answers).filter(([i,v])=>parseInt(v)===qcmData[i].ans).length;
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="mcq-score-bar">
      <div class="mcq-score-info">
        <h3>✅ QCM — ${title}</h3>
        <p>${answered} / ${qcmData.length} répondues · ${qcmData.length-answered} restantes</p>
      </div>
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="mcq-score-num" style="color:${color}">${answered>0?correct+'/'+answered:'—'}</div>
        ${answered>0?`<button class="btn-mcq-reset" onclick="${resetFn}()">🔄 Reset</button>`:''}
      </div>
    </div>
  `;
  const list = document.createElement('div');
  list.className = 'mcq-section';
  qcmData.forEach((q,qi) => {
    const chosen = answers.hasOwnProperty(qi) ? parseInt(answers[qi]) : null;
    const isAnswered = chosen !== null;
    const isCorrect  = chosen === q.ans;
    const card = document.createElement('div');
    card.className = 'mcq-card';
    card.innerHTML = `
      <div class="mcq-q">Q${qi+1}. ${q.q}</div>
      <div class="mcq-opts">
        ${q.opts.map((opt,oi)=>{
          let cls='mcq-opt';
          if(isAnswered){if(oi===q.ans)cls+=' correct';else if(oi===chosen&&!isCorrect)cls+=' wrong';}
          return `<button class="${cls}" ${isAnswered?'disabled':''} onclick="${answerFn}(${qi},${oi})">
            ${isAnswered?(oi===q.ans?'✓ ':oi===chosen&&!isCorrect?'✗ ':''):''}${opt}
          </button>`;
        }).join('')}
      </div>
      ${isAnswered?`<div class="mcq-feedback ${isCorrect?'ok':'fail'}">
        ${isCorrect?'✓ Correct !':'✗ Incorrect.'} ${q.expl}
      </div>`:''}
    `;
    list.appendChild(card);
  });
  div.appendChild(list);
  return div;
}

    q: "______ of classical ballet in the United States began around 1830.",
    blank: "______",
    opts: ["To teach", "Is teaching", "It was taught", "The teaching"],
    ans: 3,
    exp: "On a besoin d'un sujet nominal pour cette phrase. \"The teaching\" (gérondif nominalisé) fonctionne comme sujet de \"began\"."
  },
  {
    q: "Mason bees are solitary bees, which means ______ in colonies like honeybees or bumblebees.",
    blank: "______",
    opts: ["do not live", "when they do not live", "that they do not live", "that do not live"],
    ans: 2,
    exp: "\"Which means\" introduit une proposition complétive avec \"that\" + sujet (they) + verbe. \"That they do not live\" est la seule option grammaticalement complète."
  },
  {
    q: "Long before the advent of written literature, ______ their myths and stories in oral poems told by successive generations.",
    blank: "______",
    opts: ["people recorded", "recording people", "people's recordings", "people who recorded"],
    ans: 0,
    exp: "La phrase principale a besoin d'un sujet + verbe conjugué. \"People recorded\" (sujet + verbe au passé) complète la phrase correctement."
  },
  {
    q: "Comparative anatomy is ______ classification of both plants and animals.",
    blank: "______",
    opts: ["the basis for", "for basics", "the basis that", "the basically"],
    ans: 0,
    exp: "\"The basis for\" est l'expression correcte : \"the basis for + nom\". Les autres options sont agrammaticales ou incorrectes dans ce contexte."
  },
  {
    q: "Although legend has it that the Pilgrims first set foot in America on Plymouth Rock in 1620, ______ documentary evidence confirming this.",
    blank: "______",
    opts: ["no", "still is no", "there is no", "but no"],
    ans: 2,
    exp: "\"There is no\" introduit une structure existentielle négative correcte. \"No\" seul ou \"but no\" sont incorrects après la virgule car il faut un sujet + verbe."
  },
  {
    q: "Despite its fishlike form, the whale is ______ and will drown if submerged too long.",
    blank: "______",
    opts: ["an animal breathes air", "an animal that breathes air", "an animal breathes air", "that an animal breathes air"],
    ans: 1,
    exp: "\"An animal that breathes air\" utilise une proposition relative correcte (that + verbe) pour qualifier \"animal\"."
  },
  {
    q: "Clouds ______ in warm air rises, cools, and condenses.",
    blank: "______",
    opts: ["when form water vapor", "form when water vapor", "form vapor water when", "vapor form when water"],
    ans: 1,
    exp: "\"Clouds form when water vapor [rises...]\" : \"form\" est le verbe principal, \"when\" introduit la subordonnée de temps avec \"water vapor\" comme sujet."
  },
  {
    q: "Portland, ______, is located primarily on two hilly peninsulas overlooking Casco Bay and its many islands.",
    blank: "______",
    opts: ["which Maine's largest city", "Maine's largest city", "is Maine's largest city", "Maine's largest city"],
    ans: 1,
    exp: "\"Maine's largest city\" est une appositive (explication entre virgules). Pas besoin de \"which\" ni de verbe ici car c'est une incise nominale."
  },
  {
    q: "Mars, the so-called red planet, is actually colored red by iron oxide and other impurities ______ the whole surface.",
    blank: "______",
    opts: ["that cover", "in which are covered", "that they cover", "and covered"],
    ans: 0,
    exp: "\"That cover\" est une proposition relative correcte : \"impurities that cover the whole surface\". \"That they cover\" est redondant (double sujet)."
  },
  {
    q: "The 1903 film The Great Train Robbery was the first significant film in which the classic western story's formula of crime and retribution ______.",
    blank: "______",
    opts: ["was used", "to be used", "used", "had used"],
    ans: 0,
    exp: "\"Was used\" (passif passé) est correct car la formule est utilisée (passive), et le contexte est passé. \"Used\" actif changerait le sens : ce n'est pas la formule qui utilise quelque chose."
  },
  {
    q: "When played in certain ways, the bassoon can produce comical sounds, ______ it sometimes referred to as the clown of the orchestra.",
    blank: "______",
    opts: ["or", "that", "so", "whether"],
    ans: 2,
    exp: "\"So\" exprime la conséquence : les sons comiques ont pour conséquence qu'on le surnomme \"le clown de l'orchestre\". C'est un \"so\" de résultat."
  },
  {
    q: "In modern societies, ______ authorized body such as a legislature or a court makes the law.",
    blank: "______",
    opts: ["some", "some of", "some the", "for some"],
    ans: 0,
    exp: "\"Some authorized body\" = un certain organe. \"Some\" devant un nom singulier signifie \"un certain\". \"Some of\" nécessiterait un article après (some of the)."
  },
  {
    q: "The sense of smell functions chemically, ______ the sense of taste, but it is 10,000 times more sensitive.",
    blank: "______",
    opts: ["as does", "so have", "which as", "by which"],
    ans: 0,
    exp: "\"As does the sense of taste\" est une structure comparative inversée (comme le fait le sens du goût). C'est une ellipse élégante : \"as the sense of taste does\"."
  },
  {
    q: "______ primarily from plant oils, perfumes were used in ancient times as incense in religious rites, in medicines, and later for adornment.",
    blank: "______",
    opts: ["Made them", "They made", "Made", "By making"],
    ans: 2,
    exp: "\"Made\" est un participe passé utilisé en appositive participiale (= Being made / Having been made). Le sujet implicite est \"perfumes\". \"Made them\" ou \"They made\" créeraient un dangling modifier."
  },
  {
    q: "Boise became ______ of the state of Idaho in 1864.",
    blank: "______",
    opts: ["as the capital", "the capital", "to be the capital", "the capital was"],
    ans: 1,
    exp: "\"Became the capital\" : après \"become\", on utilise directement le groupe nominal sans \"as\", \"to be\", ou verbe supplémentaire."
  },
];

function buildGrammar6Section() {
  injectGrammar6CSS && injectGrammar6CSS();
  const answers = S.mcqAnswers6 || {};
  const answered = Object.keys(answers).length;
  const total = GRAMMAR6_QCM.length;
  const qi = S.grammar6cursor !== undefined ? S.grammar6cursor : 0;
  const done = answers[qi] !== undefined;
  const q = GRAMMAR6_QCM[qi];
  const userAns = answers[qi];
  const isCorrect = done && userAns === q.ans;
  const pct = Math.round((answered / total) * 100);

  // Check if all answered → show results
  if (answered === total && S.grammar6View === 'results') {
    return buildGrammar6Results();
  }

  const wrap = document.createElement('div');
  wrap.className = 'g6-page fade-up';

  // Header
  const letters = ['A','B','C','D'];

  // Build sentence with highlighted blank
  const displayQ = q.q.replace('______', `<span class="g6-blank ${done ? (isCorrect ? 'correct' : 'wrong') : ''}" id="g6blank">${done ? q.opts[q.ans] : '______'}</span>`);

  wrap.innerHTML = `
    <div class="g6-header">
      <div class="g6-tag">✏️ Sentence Completion</div>
      <div class="g6-progress-wrap">
        <div class="g6-progress-bar"><div class="g6-progress-fill" style="width:${pct}%"></div></div>
        <div class="g6-progress-label">${answered}/${total}</div>
      </div>
    </div>

    <div class="g6-card">
      <div class="g6-qnum">Question ${qi + 1} sur ${total}</div>
      <div class="g6-sentence">${displayQ}</div>

      <div class="g6-opts">
        ${q.opts.map((opt, oi) => {
          let cls = '';
          if (done) {
            cls = 'disabled ';
            if (oi === q.ans) cls += 'reveal-correct';
            if (oi === userAns && userAns !== q.ans) cls += 'selected-wrong';
            if (oi === userAns && userAns === q.ans) cls += 'selected-correct';
          }
          return `
            <div class="g6-opt ${cls}" onclick="${done ? '' : `answerG6(${qi},${oi})`}">
              <div class="g6-opt-letter">${letters[oi]}</div>
              <div class="g6-opt-text">${opt}</div>
            </div>`;
        }).join('')}
      </div>

      <div class="g6-explanation ${done ? 'visible' : ''}">
        <div class="g6-exp-label">💡 Explication</div>
        ${q.exp}
      </div>
    </div>

    <div class="g6-nav">
      <button class="g6-btn-nav" onclick="g6Nav(-1)" ${qi === 0 ? 'disabled' : ''}>← Précédent</button>
      <span style="font-family:var(--mono);font-size:.65rem;color:var(--muted)">${qi+1} / ${total}</span>
      ${qi < total - 1
        ? `<button class="g6-btn-nav primary" onclick="g6Nav(1)">Suivant →</button>`
        : answered === total
          ? `<button class="g6-btn-nav primary" onclick="showG6Results()">Voir les résultats →</button>`
          : `<button class="g6-btn-nav" onclick="g6Nav(1)" ${!done ? 'disabled' : ''}>Suivant →</button>`
      }
    </div>

    ${answered > 0 && answered < total && qi === total - 1 && answered < total ? '' : ''}
    ${answered > 0 ? `
      <div style="text-align:center;margin-top:16px;">
        <button onclick="resetG6()" style="font-family:var(--mono);font-size:.6rem;color:var(--muted);
          background:none;border:none;cursor:pointer;text-decoration:underline;">
          Recommencer depuis le début
        </button>
      </div>` : ''}
  `;
  return wrap;
}

function buildGrammar6Results() {
  const answers = S.mcqAnswers6 || {};
  const total = GRAMMAR6_QCM.length;
  const correct = GRAMMAR6_QCM.filter((q, i) => answers[i] === q.ans).length;
  const pct = Math.round((correct / total) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '💪' : '📖';

  const wrap = document.createElement('div');
  wrap.className = 'g6-page fade-up';
  wrap.innerHTML = `
    <div class="g6-header">
      <div class="g6-tag">✏️ Sentence Completion</div>
      <div class="g6-tag" style="background:rgba(45,106,79,.08);border-color:rgba(45,106,79,.3);color:#2d6a4f">Résultats</div>
    </div>
    <div class="g6-score-card">
      <div style="font-size:2.5rem;margin-bottom:8px">${emoji}</div>
      <div class="g6-score-big">${correct} / ${total}</div>
      <div class="g6-score-sub">${pct}% de bonnes réponses</div>
      <div class="g6-score-bar-wrap">
        <div class="g6-score-bar-fill" style="width:${pct}%"></div>
      </div>
      <button class="g6-btn-nav primary" onclick="resetG6()" style="margin:0 auto">🔄 Recommencer</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${GRAMMAR6_QCM.map((q, i) => {
        const ua = answers[i];
        const ok = ua === q.ans;
        return `
          <div style="background:var(--surface);border:1.5px solid ${ok?'rgba(45,106,79,.3)':'rgba(193,18,31,.25)'};
            border-radius:12px;padding:14px 16px;">
            <div style="font-family:var(--mono);font-size:.55rem;color:${ok?'#2d6a4f':'#c1121f'};
              text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">
              Q${i+1} — ${ok?'✓ Correct':'✗ Incorrect'}
            </div>
            <div style="font-size:.8rem;color:var(--text);margin-bottom:6px;font-weight:600">
              ${q.q.replace('______', `<strong style="color:${ok?'#2d6a4f':'#c1121f'}">${q.opts[q.ans]}</strong>`)}
            </div>
            ${!ok ? `<div style="font-size:.75rem;color:var(--muted)">Ta réponse : <em>${q.opts[ua]??'—'}</em></div>` : ''}
          </div>`;
      }).join('')}
    </div>
  `;
  return wrap;
}

function answerG6(qi, oi) {
  if (!S.mcqAnswers6) S.mcqAnswers6 = {};
  S.mcqAnswers6[qi] = oi;
  if (oi === GRAMMAR6_QCM[qi].ans) { S.streak++; save(); toast('✓ Correct !'); }
  else toast('✗ — Lis l\'explication');
  render();
}
function g6Nav(dir) {
  const max = GRAMMAR6_QCM.length - 1;
  S.grammar6cursor = Math.max(0, Math.min(max, (S.grammar6cursor || 0) + dir));
  render();
}
function showG6Results() { S.grammar6View = 'results'; render(); }
function resetG6() {
  S.mcqAnswers6 = {};
  S.grammar6cursor = 0;
  S.grammar6View = 'mcq';
  render();
  toast('Exercice réinitialisé');
}

function injectGrammar6CSS() {
  if (document.getElementById('g6css')) return;
  const s = document.createElement('style');
  s.id = 'g6css';
  // already injected via IIFE above
}

// ═══════════════════════════════════════════════════════════
// SPEAK & IMPROVE SECTION
// ═══════════════════════════════════════════════════════════
const SPEAK_PROMPTS = [
  "Describe what you do at work as a QA engineer.",
  "Explain what a bug report is and how to write one.",
  "Tell me about the difference between a bug and a feature request.",
  "Describe your typical day at Lacoste.",
  "What is the purpose of regression testing?",
  "Explain what CI/CD means in your own words.",
  "How do you prioritise bugs in a sprint?",
  "What happens when you find a blocker before a release?",
  "Describe a time you had to communicate a critical bug to your team.",
  "What tools do you use for test management?",
];

let _recognition = null;
let _isRecording = false;

function buildSpeakSection() {
  const sp = S.speak;
  const prompt = SPEAK_PROMPTS[sp.promptIdx % SPEAK_PROMPTS.length];

  const wrap = document.createElement('div');
  wrap.className = 'speak-page fade-up';

  wrap.innerHTML = `
    <div class="speak-header-tag">🎤 ORAL PRACTICE</div>
    <div class="speak-title">Speak & Improve</div>
    <div class="speak-subtitle">Parle en anglais — Claude analyse ta phrase en temps réel</div>

    <div class="speak-prompt-zone">
      <div class="speak-prompt-label">💡 Sujet proposé</div>
      <div class="speak-prompt-card">
        <div class="speak-prompt-text">"${prompt}"</div>
        <button class="btn-new-prompt" onclick="nextSpeakPrompt()">Autre →</button>
      </div>
    </div>

    <div class="speak-mic-zone">
      <button class="btn-mic ${_isRecording ? 'recording' : ''}" id="btnMic" onclick="toggleRecording()">
        ${_isRecording ? '⏹' : '🎤'}
      </button>
      <div class="mic-status ${_isRecording ? 'active' : ''}" id="micStatus">
        ${_isRecording ? 'ÉCOUTE EN COURS...' : 'APPUIE POUR PARLER'}
      </div>
    </div>

    <div class="speak-prompt-label" style="margin-bottom:8px;">Ce que tu as dit</div>
    <div class="speak-transcript ${sp.transcript ? 'has-text' : ''}" id="speakTranscript">
      ${sp.transcript || 'Ta phrase apparaîtra ici...'}
    </div>

    ${sp.loading ? `
      <div class="speak-feedback-card loading">
        <div class="speak-loading-dot">
          <span></span><span></span><span></span>
        </div>
        <div style="font-family:var(--mono);font-size:.65rem;color:var(--muted);margin-top:8px;">Claude analyse ta phrase...</div>
      </div>
    ` : sp.feedback ? renderSpeakFeedback(sp.feedback, sp.transcript) : ''}
  `;

  return wrap;
}

function renderSpeakFeedback(fb, original) {
  const isSame = fb.corrected && fb.corrected.trim().toLowerCase() === original.trim().toLowerCase();
  const score = fb.score || 0;
  const scoreColor = score >= 8 ? '#2d6a4f' : score >= 5 ? '#b45309' : '#c1121f';
  const errors = fb.errors || [];

  return `
    <div class="speak-feedback-card">
      <div class="sfb-row">
        <div class="sfb-label">✏️ Version corrigée</div>
        <div class="sfb-corrected ${isSame ? 'same' : ''}">${isSame ? '✓ Pas de correction nécessaire !' : fb.corrected}</div>
      </div>

      ${errors.length > 0 ? `
        <div class="sfb-row">
          <div class="sfb-label">⚠️ Points à corriger</div>
          <div class="sfb-errors">
            ${errors.map(e => `<div class="sfb-error-item">→ ${e}</div>`).join('')}
          </div>
        </div>
      ` : ''}

      <div class="sfb-row">
        <div class="sfb-label">💡 Conseil</div>
        <div class="sfb-tip">${fb.tip || '—'}</div>
      </div>

      <div class="sfb-row">
        <div class="sfb-label">🎯 Score</div>
        <div class="speak-score">
          <div class="speak-score-num" style="color:${scoreColor}">${score}/10</div>
          <div class="speak-score-bar-wrap">
            <div class="speak-score-fill" style="width:${score*10}%;background:${scoreColor}"></div>
          </div>
        </div>
      </div>

      <div class="speak-btn-row">
        <button class="btn-speak-again" onclick="resetSpeak()">🎤 Réessayer</button>
        ${!isSame ? `<button class="btn-speak-play" onclick="speak('${esc(fb.corrected)}','en')">${spkSvg()} Écouter la correction</button>` : ''}
      </div>
    </div>
  `;
}

function toggleRecording() {
  if (_isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('🚫 Micro non supporté sur ce navigateur'); return; }

  _recognition = new SR();
  _recognition.lang = 'en-US';
  _recognition.continuous = false;
  _recognition.interimResults = true;

  _recognition.onstart = () => {
    _isRecording = true;
    const btn = document.getElementById('btnMic');
    const status = document.getElementById('micStatus');
    if (btn) { btn.classList.add('recording'); btn.textContent = '⏹'; }
    if (status) { status.textContent = 'ÉCOUTE EN COURS...'; status.classList.add('active'); }
  };

  _recognition.onresult = (event) => {
    const interim = Array.from(event.results).map(r => r[0].transcript).join('');
    const el = document.getElementById('speakTranscript');
    if (el) { el.textContent = interim; el.classList.add('has-text'); }
    if (event.results[0].isFinal) {
      S.speak.transcript = interim;
    }
  };

  _recognition.onerror = (e) => {
    _isRecording = false;
    toast('❌ Erreur micro : ' + e.error);
    render();
  };

  _recognition.onend = () => {
    _isRecording = false;
    if (S.speak.transcript) {
      callClaudeForFeedback(S.speak.transcript);
    } else {
      render();
    }
  };

  _recognition.start();
}

function stopRecording() {
  if (_recognition) {
    _recognition.stop();
  }
}

const GRAMMAR_RULES = [

  { re:/\b(he|she|it)\s+go\b/gi,             fix:(m,s)=>m.replace(/\bgo\b/i,"goes"),          msg:"3ème personne : \"he/she/it goes\"" },

  { re:/\b(he|she|it)\s+know\b/gi,           fix:(m,s)=>m.replace(/\bknow\b/i,"knows"),       msg:"3ème personne : \"he/she/it knows\"" },

  // False friends & common French mistakes
  { re:/\bI am agree\b/gi,                   fix:()=>"I agree",                               msg:"\"I am agree\" n'existe pas → \"I agree\"" },
  { re:/\bI am disagree\b/gi,                fix:()=>"I disagree",                            msg:"\"I am disagree\" n'existe pas → \"I disagree\"" },

  { re:/\bdid a mistake\b/gi,                fix:()=>"made a mistake",                        msg:"On \"makes\" une erreur → passé : \"made a mistake\"" },
  { re:/\bmake a travel\b/gi,                fix:()=>"travel / take a trip",                  msg:"\"travel\" est un verbe ou indénombrable → \"travel\" ou \"take a trip\"" },
  { re:/\bI have \d+ years\b/gi,             fix:(m)=>m.replace(/I have/i,"I am"),            msg:"Pour l'âge : \"I am X years old\" (pas \"I have\")" },

  { re:/\bI am boring\b/gi,                  fix:()=>"I am bored",                            msg:"\"boring\" = ennuyeux (chose), \"bored\" = qui s'ennuie (personne)" },
  { re:/\bI am very interesting\b/gi,        fix:()=>"I find it very interesting",            msg:"\"interesting\" décrit une chose, \"interested\" décrit une personne" },

  // Uncountable nouns (fréquent en QA/business)
  { re:/\binformations\b/gi,                 fix:()=>"information",                           msg:"\"information\" est indénombrable, pas de -s" },
  { re:/\badvices\b/gi,                      fix:()=>"advice",                                msg:"\"advice\" est indénombrable, pas de -s" },
  { re:/\bfeedbacks\b/gi,                    fix:()=>"feedback",                              msg:"\"feedback\" est indénombrable, pas de -s" },
  { re:/\bknowledges\b/gi,                   fix:()=>"knowledge",                             msg:"\"knowledge\" est indénombrable, pas de -s" },
  { re:/\bprogresss\b/gi,                    fix:()=>"progress",                              msg:"\"progress\" est indénombrable, pas de -s" },
  { re:/\bresearchs\b/gi,                    fix:()=>"research",                              msg:"\"research\" est indénombrable, pas de -s" },
  { re:/\bequipments\b/gi,                   fix:()=>"equipment",                             msg:"\"equipment\" est indénombrable, pas de -s" },

  // Article errors (common for French speakers)
  { re:/\bsince \d+ (day|week|month|year)s?\b/gi, fix:(m)=>{ if(!/since \d/.test(m)) return m; return m.replace(/since (\d+)/i,'for $1'); }, msg:"\"since\" + point précis, \"for\" + durée (for 3 days)" },

  // Tense & auxiliary errors
  { re:/\bI have went\b/gi,                  fix:()=>"I have gone / I went",                  msg:"Participe passé de go = \"gone\" (I have gone) ou prétérit \"I went\"" },
  { re:/\bI have saw\b/gi,                   fix:()=>"I have seen",                           msg:"Participe passé de see = \"seen\" → I have seen" },

  { re:/\bI have came\b/gi,                  fix:()=>"I have come",                           msg:"Participe passé de come = \"come\" → I have come" },
  { re:/\bI have taked\b/gi,                 fix:()=>"I have taken",                          msg:"Participe passé de take = \"taken\" → I have taken" },

  { re:/\bwould can\b/gi,                    fix:()=>"would be able to",                      msg:"Deux modaux ne se combinent pas → \"would be able to\"" },

  // QA-specific vocabulary errors
  { re:/\bI tested the application and there (is|was) a problem\b/gi, fix:(m)=>m.replace(/problem/i,'issue/bug'), msg:"En QA : préfère \"issue\" ou \"bug\" à \"problem\"" },
  { re:/\bthe bug is not working\b/gi,       fix:()=>"the feature is not working",            msg:"Le bug ne \"marche pas\", c'est la fonctionnalité qui ne fonctionne pas" },
  { re:/\bI will\s+(\w+)\s+it tomorrow\b/gi, fix:(m)=>m,                                     msg:"Bonne utilisation de will pour le futur ✓" },

  // Preposition errors
  { re:/\bdepend of\b/gi,                    fix:()=>"depend on",                             msg:"\"depend\" se construit avec \"on\" → depend on" },
  { re:/\bsimilar of\b/gi,                   fix:()=>"similar to",                            msg:"\"similar\" se construit avec \"to\" → similar to" },
  { re:/\binterested to\b(?!\s+(?:know|learn|see|find|hear))/gi, fix:()=>"interested in",    msg:"\"interested\" se construit avec \"in\" → interested in" },
  { re:/\bgood in\b/gi,                      fix:()=>"good at",                               msg:"\"good\" se construit avec \"at\" → good at something" },
  { re:/\barrived to\b/gi,                   fix:()=>"arrived at/in",                         msg:"\"arrived\" + at (endroit précis) ou in (ville/pays)" },
  { re:/\bexplain me\b/gi,                   fix:()=>"explain to me",                         msg:"\"explain\" a besoin de \"to\" → explain to me" },

  // Word order
  { re:/\bI too am\b/gi,                     fix:()=>"I am too",                              msg:"Ordre des mots : \"I am too\" (pas \"I too am\")" },
  { re:/\balways I\b/gi,                     fix:()=>"I always",                              msg:"Les adverbes de fréquence se placent avant le verbe principal" },
  { re:/\bever I\b/gi,                       fix:()=>"I ever",                                msg:"Ordre des mots : sujet + adverbe + verbe" },
];

// Tips pool by error category
const TIPS_POOL = {
  agreement: "Mémo : he/she/it → toujours un -s ou -es sur le verbe au présent simple.",
  uncountable: "Astuce : information, advice, feedback, equipment → jamais de -s en anglais.",
  falseFriend: "Attention aux faux-amis : traduis le sens, pas le mot français mot à mot.",
  preposition: "Les prépositions s'apprennent par cœur avec le verbe : depend ON, good AT, similar TO.",
  tense: "Pour le present perfect : have/has + participe passé (gone, seen, done, taken...).",
  general: "Parle en phrases complètes avec sujet + verbe + complément pour être plus clair.",
};

function offlineAnalyze(text) {
  let corrected = text;
  const errors = [];
  let errorCategories = new Set();

  GRAMMAR_RULES.forEach(rule => {
    if (rule.re.test(corrected)) {
      const before = corrected;
      corrected = corrected.replace(rule.re, rule.fix);
      rule.re.lastIndex = 0; // reset stateful regex
      if (corrected !== before || rule.re.test(text)) {
        errors.push(rule.msg);
        // detect category
        if (rule.msg.includes('3ème personne')) errorCategories.add('agreement');
        else if (rule.msg.includes('indénombrable')) errorCategories.add('uncountable');
        else if (rule.msg.includes('faux')) errorCategories.add('falseFriend');
        else if (rule.msg.includes('préposition') || ['on','at','in','to'].some(p=>rule.msg.includes('"'+p+'"'))) errorCategories.add('preposition');
        else if (rule.msg.includes('participe') || rule.msg.includes('passé')) errorCategories.add('tense');
      }
    }
    rule.re.lastIndex = 0;
  });

  // Length / fluency check
  const wordCount = text.trim().split(/\s+/).length;
  if (wordCount < 4) {
    errors.push("Essaie de parler en phrases complètes (sujet + verbe + complément)");
    errorCategories.add('general');
  }

  // Pick most relevant tip
  const cat = [...errorCategories][0] || 'general';
  const tip = TIPS_POOL[cat];

  // Score : start at 10, -1.5 per error, min 2
  const score = Math.max(2, Math.round(10 - errors.length * 1.5));

  return { corrected, errors, tip, score };
}

function callClaudeForFeedback(text) {
  S.speak.loading = true;
  S.speak.feedback = null;
  render();

  // Small delay to show loading state
  setTimeout(() => {
    const fb = offlineAnalyze(text);
    S.speak.feedback = fb;
    S.speak.loading = false;
    if (fb.errors.length === 0) { S.streak++; save(); }
    render();
  }, 600);
}

function resetSpeak() {
  S.speak.transcript = '';
  S.speak.feedback = null;
  S.speak.loading = false;
  render();
}

function nextSpeakPrompt() {
  S.speak.promptIdx = (S.speak.promptIdx + 1) % SPEAK_PROMPTS.length;
  resetSpeak();
}

// ── Start a session ────────────────────────────────────────
function startSession(moduleKey, startPos, skipBatch) {
  const cfg  = SESS_CFG[moduleKey];
  const data = cfg.getData();
  const total = data.length;

  if (startPos >= total) startPos = 0;

  const batchEnd = Math.min(startPos + BATCH_SIZE, total);
  const batch = [];
  for (let i = startPos; i < batchEnd; i++) {
    batch.push({ ...data[i], _sec: moduleKey, _idx: i });
  }

  S.session = {
    moduleKey,
    type: cfg.type,
    color: cfg.color,
    label: cfg.label,
    batch,
    batchStart: startPos,
    batchEnd,
    totalItems: total,
    cardIdx: 0,            // position in current batch
    answers: {},           // idx→ {chosen, correct} for MCQ / {val} for FC
    showRecap: false,
    showErrors: false,
  };

  // Save resume position (will be updated as we go)
  S.sessProgress[moduleKey] = { pos: startPos };
  save();

  S.tab = 'session';
  const bar = document.getElementById('backBar');
  bar.style.display = 'flex';
  bar.onclick = () => { S.tab = moduleKey; S.session = null; render(); };
  render();
}

function sessMarkFc(cardIdx, val) {
  const sess = S.session;
  const item = sess.batch[cardIdx];
  const prev = sess.answers[cardIdx];
  // Toggle: click same = unmark
  const newVal = (prev && prev.val === val) ? null : val;
  if (newVal) {
    sess.answers[cardIdx] = { val: newVal, correct: newVal === 'ok' };
    setS(item._sec, item._idx, newVal);
    if (newVal === 'ok') { S.streak++; save(); }
  } else {
    delete sess.answers[cardIdx];
    setS(item._sec, item._idx, null);
  }
  render();
}

  div.className = 'sess-mcq-card';

  div.innerHTML = `
    <div class="sess-mcq-q">Q${item._idx+1}. ${item.q}</div>
    <div class="sess-mcq-opts">
      ${item.opts.map((opt, oi) => {
        let cls = 'sess-mcq-opt';
        if (answered) {
          if (oi === item.ans) cls += ' correct';
          else if (oi === chosen && !isCorrect) cls += ' wrong';
        }
        return `<button class="${cls}" ${answered?'disabled':''} onclick="sessMcqAnswer(${cardIdx},${oi},${item.ans})">
          ${answered ? (oi===item.ans ? '✓ ' : oi===chosen&&!isCorrect ? '✗ ' : '  ') : ''}${opt}
        </button>`;
      }).join('')}
    </div>
    ${answered ? `
      <div class="sess-mcq-expl ${isCorrect?'ok':'fail'}">
        ${isCorrect?'✓ Correct !':'✗ Incorrect.'} ${item.expl}
      </div>` : ''}

    <button class="btn-sess-next" ${answered?'':'disabled'} onclick="sessNext()">
      ${cardIdx+1 >= sess.batch.length ? '🏁 Voir le récap →' : 'Suivant →'}
    </button>
  `;

  return div;
}

function sessMcqAnswer(cardIdx, chosen, correctAns) {
  const sess = S.session;
  if (sess.answers.hasOwnProperty(cardIdx)) return; // already answered
  const isCorrect = chosen === correctAns;
  sess.answers[cardIdx] = { chosen, correct: isCorrect };

  // Persist into the right mcqAnswers key
  const cfg = SESS_CFG[sess.moduleKey];
  const item = sess.batch[cardIdx];
  if (cfg.answersKey) {
    if (!S[cfg.answersKey]) S[cfg.answersKey] = {};
    S[cfg.answersKey][item._idx] = chosen;
  }

  if (isCorrect) { S.streak++; save(); }
  render();
}

// ── Navigate between cards ─────────────────────────────────
function sessNext() {
  const sess = S.session;
  if (sess.cardIdx + 1 >= sess.batch.length) {
    // End of batch → show recap
    // Save progress: next position after this batch
    const nextPos = sess.batchEnd;
    S.sessProgress[sess.moduleKey] = { pos: nextPos };
    save();
    sess.showRecap = true;
    render();
  } else {
    sess.cardIdx++;
    render();
  }
}

function sessionPause() {
  // Save current position and go back to launcher
  const sess = S.session;
  if (sess) {
    S.sessProgress[sess.moduleKey] = { pos: sess.batchStart + sess.cardIdx };
    save();
  }
  S.tab = sess ? sess.moduleKey : 'home';
  S.session = null;
  render();
}

// ── Recap screen ───────────────────────────────────────────
function buildSessionRecap() {
  const sess = S.session;
  const { batch, answers, color, label, moduleKey, batchStart, batchEnd, totalItems, type } = sess;

  const total = batch.length;
  const correct = Object.values(answers).filter(a => a.correct).length;
  const wrong   = total - correct;
  const pct     = total > 0 ? Math.round((correct / total) * 100) : 0;

  let em='😅', ti='Continue !', sub='Quelques erreurs — bon effort !';
  if (pct >= 90) { em='🏆'; ti='Excellent !'; sub='Quasi parfait !'; }
  else if (pct >= 70) { em='💪'; ti='Bien joué !'; sub='Encore quelques à consolider.'; }
  else if (pct >= 50) { em='📈'; ti='En progrès !'; sub='La moitié réussie — continue !'; }

  // Collect errors
  const errors = batch.map((item, i) => {
    const a = answers[i];
    if (!a || a.correct) return null;
    return { item, i, ans: a };
  }).filter(Boolean);

  const nextPos = batchEnd;
  const hasMore = nextPos < totalItems;
  const batchNum   = Math.floor(batchStart / BATCH_SIZE) + 1;
  const batchTotal = Math.ceil(totalItems / BATCH_SIZE);

  const wrap = document.createElement('div');
  wrap.className = 'session-page fade-up';

  wrap.innerHTML = `
    <div class="sess-recap">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:2.8rem;margin-bottom:8px;">${em}</div>
        <div style="font-size:1.1rem;font-weight:800;color:${color};font-family:var(--mono);text-transform:uppercase;">${ti}</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:4px;">${sub}</div>
        <div style="font-family:var(--mono);font-size:.58rem;color:var(--muted);margin-top:8px;letter-spacing:1px;">Lot ${batchNum}/${batchTotal} — ${label}</div>
      </div>

      <div class="sess-recap-scores">
        <div class="sess-score-chip ok"><span class="n">${correct}</span><span class="l">${type==='fc'?'Maîtrisés':'Corrects'}</span></div>
        <div class="sess-score-chip fail"><span class="n">${wrong}</span><span class="l">Erreurs</span></div>
        <div class="sess-score-chip pct"><span class="n">${pct}%</span><span class="l">Score</span></div>
      </div>

      ${errors.length > 0 ? `
        <button class="sess-errors-toggle" id="errToggle" onclick="sessToggleErrors()">
          👁 Voir les ${errors.length} erreur${errors.length>1?'s':''} du lot
        </button>
        <div id="sessErrorList" style="display:none;">
          <div class="sess-errors-list">
            ${errors.map(({item, i, ans}) => {
              const isFC = type === 'fc';
              const wrongLabel = isFC
                ? (ans.val === 'review' ? '🔄 Mis en révision' : '— pas marqué')
                : `✗ Tu as choisi : "${item.opts[ans.chosen]}"`;
              const correctLabel = isFC
                ? `✓ Bonne réponse : mémoriser`
                : `✓ Correct : "${item.opts[item.ans]}"`;
              return `
                <div class="sess-error-card">
                  <div class="ec-en">${item.en || item.q}</div>
                  <div class="ec-fr">${item.fr || ''}</div>
                  <div class="ec-expl">
                    <div>${wrongLabel}</div>
                    <div style="margin-top:4px;color:var(--accent2);">${correctLabel}</div>
                    ${item.expl ? `<div style="margin-top:4px;color:var(--muted);">💡 ${item.expl}</div>` : ''}
                    ${item.example ? `<div style="margin-top:4px;font-style:italic;">Ex : "${item.example}"</div>` : ''}
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>` : `
        <div style="text-align:center;padding:12px;font-family:var(--mono);font-size:.72rem;color:var(--accent2);background:rgba(45,106,79,.08);border-radius:10px;margin-bottom:8px;">
          🎉 Lot parfait — aucune erreur !
        </div>`}

      <div class="sess-recap-btns">
        ${hasMore ? `
          <button class="btn-recap prim" style="background:${color}" onclick="startSession('${moduleKey}', ${nextPos})">
            ▶ Lot suivant (${batchNum+1}/${batchTotal}) →
          </button>` : `
          <button class="btn-recap prim" style="background:${color}" disabled>
            🏆 Module terminé !
          </button>`}
        <button class="btn-recap sec" onclick="goHome()">🏠 Accueil</button>
        <button class="btn-recap restart" onclick="startSession('${moduleKey}', 0)">↺ Recommencer depuis le début</button>
      </div>
    </div>
  `;

  return wrap;
}

function sessToggleErrors() {
  const list = document.getElementById('sessErrorList');
  const btn  = document.getElementById('errToggle');
  if (!list) return;
  const shown = list.style.display !== 'none';
  list.style.display = shown ? 'none' : 'block';
  btn.textContent = shown
    ? `👁 Voir les erreurs du lot`
    : `🙈 Masquer les erreurs`;
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function spkSvg(){return`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>`;}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function norm(s){return s.toLowerCase().replace(/[éèêë]/g,'e').replace(/[àâä]/g,'a').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u').replace(/[ç]/g,'c').replace(/[''`]/g,"'").replace(/\s+/g,' ').trim();}
function checkAns(inp,exp){
  const a=norm(inp),b=norm(exp);
  if(a===b)return true;
  // allow (verb) suffix in parens
  const bClean=b.replace(/\s*\(.*?\)/g,'').trim();
  if(a===bClean)return true;
  const wb=b.split(' '),wa=a.split(' ');
  if(wb.length>=3){const h=wb.filter(w=>wa.includes(w)).length;return h/wb.length>=0.75;}
  return false;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
load(); render();
</script>
